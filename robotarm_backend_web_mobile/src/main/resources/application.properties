spring.application.name=robot-arm-control

# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/robot_arm_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Ehoh29032002+
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=8080

# Static resources
spring.web.resources.static-locations=classpath:/static/
spring.mvc.view.prefix=/static/

# ?????????????????????????????????????????
# MQTT Configuration (Eclipse Mosquitto)
# ?????????????????????????????????????????
mqtt.broker.url=tcp://localhost:1883
mqtt.broker.username=
mqtt.broker.password=
mqtt.client.id=robot-arm-springboot

# Topics ? Inbound (Spring SUBSCRIBES = receives commands from device/dashboard)
mqtt.topic.command=robot/arm/command
mqtt.topic.reset=robot/arm/reset

# Topics ? Outbound (Spring PUBLISHES = sends status back)
mqtt.topic.status=robot/arm/status
mqtt.topic.angles=robot/arm/angles

spring.web.cors.allowed-origin-patterns=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true
spring.web.cors.max-age=3600