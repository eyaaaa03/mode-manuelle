<svg viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg" width="200" height="60">
  <defs>
    <linearGradient id="lightningGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E40AF;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#DC2626;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1"/>
    </linearGradient>
  </defs>
  
  <!-- Lightning Bolt Symbol -->
  <g id="lightning">
    <!-- Top blue triangle -->
    <polygon points="20,5 30,5 22,25" fill="#1E40AF" opacity="0.9"/>
    <!-- Middle red triangle -->
    <polygon points="15,20 35,20 18,40" fill="#DC2626" opacity="0.95"/>
    <!-- Bottom blue triangle -->
    <polygon points="22,35 28,35 20,55" fill="#1E40AF" opacity="0.9"/>
  </g>
  
  <!-- Starz Text -->
  <text x="48" y="42" font-family="'Orbitron', monospace" font-size="32" font-weight="900" letter-spacing="2" fill="#1E40AF">
    Starz
  </text>
  
  <!-- Electronics Text (smaller, red) -->
  <text x="158" y="50" font-family="'Rajdhani', sans-serif" font-size="11" font-weight="600" letter-spacing="1" fill="#DC2626">
    ELECTRONICS
  </text>
</svg>
